<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="720" viewBox="0 0 2100 720">

<defs>
  <linearGradient id="panelBg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#100C17"/>
    <stop offset="55%" stop-color="#17101F"/>
    <stop offset="100%" stop-color="#0C0911"/>
  </linearGradient>

  <linearGradient id="innerPanelBg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#130E1B"/>
    <stop offset="50%" stop-color="#100C17"/>
    <stop offset="100%" stop-color="#0B0810"/>
  </linearGradient>

  <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#6F5430"/>
    <stop offset="50%" stop-color="#D6AD65"/>
    <stop offset="100%" stop-color="#6F5430"/>
  </linearGradient>

  <linearGradient id="warmBorder" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#8F6E3E"/>
    <stop offset="100%" stop-color="#4F3920"/>
  </linearGradient>

  <radialGradient id="purpleGlow" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#A86CFF" stop-opacity="0.95"/>
    <stop offset="45%" stop-color="#7B3FD3" stop-opacity="0.72"/>
    <stop offset="100%" stop-color="#3D1D63" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="bgBloomLeft" cx="0%" cy="0%" r="68%">
    <stop offset="0%" stop-color="#2B1544" stop-opacity="0.46"/>
    <stop offset="100%" stop-color="#100C17" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="bgBloomRight" cx="100%" cy="0%" r="68%">
    <stop offset="0%" stop-color="#2B1544" stop-opacity="0.42"/>
    <stop offset="100%" stop-color="#100C17" stop-opacity="0"/>
  </radialGradient>

  <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
    <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.55"/>
  </filter>

  <filter id="ornGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="9" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>


<!-- Top decorative lines -->
<path d="M 70 76 H 470 L 525 44 H 760" fill="none" stroke="#8F6E3E" stroke-width="2"/>
<path d="M 2030 76 H 1630 L 1575 44 H 1340" fill="none" stroke="#8F6E3E" stroke-width="2"/>

<!-- Bottom decorative lines -->
<path d="M 120 658 H 900" fill="none" stroke="#3E2E21" stroke-width="1.8"/>
<path d="M 1980 658 H 1200" fill="none" stroke="#3E2E21" stroke-width="1.8"/>

<!-- Central top crest -->
<g transform="translate(1050.0,52)">
  <path d="M -44 0 L 0 -18 L 44 0 L 0 18 Z" fill="#1F132A" stroke="#C49A52" stroke-width="2"/>
  <path d="M -18 0 L 0 -9 L 18 0 L 0 9 Z" fill="#291C38" stroke="#8F6E3E" stroke-width="1.5"/>
  <circle cx="0" cy="0" r="7" fill="#8B54C5" stroke="#E0B968" stroke-width="1.4"/>
</g>

<!-- Central bottom emblem -->
<g transform="translate(1050.0,658)">
  <path d="M -28 0 L 0 -16 L 28 0 L 0 16 Z" fill="#1C1426" stroke="#8F6E3E" stroke-width="2"/>
  <circle cx="0" cy="0" r="5.5" fill="#8B54C5" stroke="#D6AD65" stroke-width="1.2"/>
</g>

<!-- Top-left corner ornament -->
<g transform="translate(56,50)">
  <path d="M 0 28 L 28 0 L 60 0 L 32 28 L 60 56 L 60 88 L 28 60 L 0 88 L 0 56 L 28 28 Z"
        fill="none" stroke="#5B4374" stroke-width="2.2"/>
  <path d="M 9 28 L 28 9 L 51 9 L 32 28 L 51 47 L 51 70 L 28 51 L 9 70 L 9 47 L 28 28 Z"
        fill="none" stroke="#2F2340" stroke-width="1.4"/>
  <ellipse cx="28" cy="28" rx="32" ry="32" fill="url(#purpleGlow)" opacity="0.65" filter="url(#ornGlow)"/>
  <path d="M 28 8 L 42 28 L 28 48 L 14 28 Z" fill="#7B3FD3" stroke="#E0B968" stroke-width="1.6"/>
  <path d="M 28 14 L 36 28 L 28 42 L 20 28 Z" fill="#B99DFF" opacity="0.85"/>
  <path d="M -6 34 L 10 34" stroke="#3A2A4A" stroke-width="1.2"/>
  <path d="M 34 -6 L 34 10" stroke="#3A2A4A" stroke-width="1.2"/>
</g>

<!-- Top-right corner ornament -->
<g transform="translate(1984,50)">
  <path d="M 60 28 L 32 0 L 0 0 L 28 28 L 0 56 L 0 88 L 32 60 L 60 88 L 60 56 L 32 28 Z"
        fill="none" stroke="#5B4374" stroke-width="2.2"/>
  <path d="M 51 28 L 32 9 L 9 9 L 28 28 L 9 47 L 9 70 L 32 51 L 51 70 L 51 47 L 32 28 Z"
        fill="none" stroke="#2F2340" stroke-width="1.4"/>
  <ellipse cx="32" cy="28" rx="32" ry="32" fill="url(#purpleGlow)" opacity="0.65" filter="url(#ornGlow)"/>
  <path d="M 32 8 L 46 28 L 32 48 L 18 28 Z" fill="#7B3FD3" stroke="#E0B968" stroke-width="1.6"/>
  <path d="M 32 14 L 40 28 L 32 42 L 24 28 Z" fill="#B99DFF" opacity="0.85"/>
  <path d="M 66 34 L 50 34" stroke="#3A2A4A" stroke-width="1.2"/>
  <path d="M 26 -6 L 26 10" stroke="#3A2A4A" stroke-width="1.2"/>
</g>

<!-- Lower side flourishes -->
<g opacity="0.9">
  <path d="M 62 584 Q 62 608 86 608 H 138" fill="none" stroke="#594228" stroke-width="1.6"/>
  <path d="M 2038 584 Q 2038 608 2014 608 H 1962" fill="none" stroke="#594228" stroke-width="1.6"/>
</g>

<!-- Small horizontal divider jewel -->
<g transform="translate(1050.0,110)">
  <path d="M -28 0 H -8" stroke="#6F5430" stroke-width="1.5"/>
  <path d="M 8 0 H 28" stroke="#6F5430" stroke-width="1.5"/>
  <path d="M 0 -8 L 8 0 L 0 8 L -8 0 Z" fill="#291C38" stroke="#C49A52" stroke-width="1.4"/>
  <circle cx="0" cy="0" r="3.2" fill="#8B54C5"/>
</g>

</svg>
